<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اِخْتَر الفِعْل الصَّحيح</title>
<style>
    @font-face {
        font-family: 'Arakom';
        src: url('Arakom-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }
    @font-face {
        font-family: 'Arakom';
        src: url('Arakom-Bold.ttf') format('truetype');
        font-weight: bold;
        font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
        font-family: 'Arakom', 'Segoe UI', Tahoma, sans-serif; 
        background: linear-gradient(135deg, #fdfbfb 0%, #e2ebf0 100%);
        color: #333; 
        height: 100vh; 
        overflow: hidden; 
        font-weight: normal;
    }

    /* Glassmorphism Ana Sınıf */
    .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    /* Özel Belirgin Kutular (Soru ve Kişi alanları için) */
    .highlight-box {
        background: rgba(255, 255, 255, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.9);
        border-radius: 25px;
        box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
    }

    /* ===== ÜST SOL KONTROLLER (Daha Küçük) ===== */
    .top-left-controls {
        position: absolute;
        top: 15px;
        left: 20px;
        display: flex;
        gap: 15px;
        z-index: 100;
        direction: ltr; 
    }
    .icon-btn {
        width: 60px; /* Daha küçük */
        height: 60px;
        border-radius: 15px;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.3s, background 0.3s;
    }
    .icon-btn:hover {
        transform: translateY(-5px) scale(1.05);
        background: rgba(255, 255, 255, 0.95);
    }
    .icon-btn svg { width: 30px; height: 30px; fill: #4a3f8a; } /* SVG daha küçük */

    /* ===== ORTAK BUTONLAR ===== */
    .btn {
        color: #4a3f8a;
        border: none;
        padding: 15px 40px;
        border-radius: 50px;
        font-size: 2.2rem;
        cursor: pointer;
        transition: transform 0.3s, box-shadow 0.3s;
        font-family: inherit;
        font-weight: normal;
    }
    .btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .btn:disabled {
        background: rgba(255, 255, 255, 0.4) !important;
        color: #aaa;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    /* ===== BAŞLANGIÇ EKRANI ===== */
    #start-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }
    #start-screen h1 {
        font-size: 6rem; 
        margin-bottom: 40px;
        color: #4a3f8a;
        font-weight: normal;
    }
    .start-buttons {
        display: flex;
        gap: 30px;
    }

    /* ===== OYUN EKRANI ===== */
    #game-screen {
        display: none;
        flex-direction: column;
        justify-content: space-between; 
        height: 100vh;
        padding: 15px 40px;
        position: relative;
    }

    .top-bar {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 10px;
    }
    
    .instruction {
        font-size: 2rem; /* Yönerge küçültüldü */
        color: #4a3f8a;
        font-weight: bold; 
        text-align: center;
    }

    /* Zamir Çubuğu (Daha küçük, pasifler gri) */
    .pronouns-bar {
        display: flex;
        justify-content: center;
        gap: 15px; 
        margin-top: 10px;
    }
    .pro-badge {
        font-size: 1.8rem; /* Zamirler küçültüldü */
        padding: 8px 25px;
        border-radius: 20px;
        color: #999; /* Pasifken gri */
        background: rgba(200, 200, 200, 0.3); /* Pasif arka planı */
        border: 1px solid rgba(255,255,255,0.5);
        transition: all 0.5s;
    }
    /* Aktif Zamir Vurgusu (Sabit Kutu) */
    .pro-badge.active {
        position: relative;
        background: #764ba2;
        color: #fff;
        border: 2px solid rgba(255, 255, 255, 0.8);
        transform: scale(1.1); /* Seçildiğinde sadece bir tık büyük durur ve sabit kalır */
        z-index: 10;
    }

    /* Dalga (Ripple) Efekti */
    .pro-badge.active::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: inherit;
        border: 3px solid #764ba2;
        animation: rippleWave 1.5s infinite ease-out;
        z-index: -1;
    }

    @keyframes rippleWave {
        0% {
            transform: scale(1);
            opacity: 0.8;
        }
        100% {
            transform: scale(1.4); /* Etrafa doğru yayılır */
            opacity: 0; /* Yayıldıkça silinerek kaybolur */
        }
    }

    /* Cümle Alanı (Ekrana Göre Esnek ve Boşlukları Optimize Edildi) */
    .sentence-wrapper {
        display: flex;
        justify-content: center;
        margin: 1.5vh 0 2.5vh 0; /* Sabit piksel yerine ekran yüksekliği yüzdesi (vh) */
    }
    /* Cümle Alanı (Daha da büyütüldü) */
    .sentence-area {
        text-align: center;
        font-size: 5rem; /* 4rem'den 5rem'e çıkarıldı */
        line-height: 1.4;
        color: #4a3f8a;
        padding: 20px 50px;
    }
    .blank {
        display: inline-block;
        min-width: 160px;
        border-bottom: 5px dashed #764ba2;
        color: #764ba2;
        padding: 0 15px;
    }

    /* Şıklar Alanı (Oyuncu kutuları arası az boşluk) */
    .options-area {
        display: flex;
        flex-grow: 1;
        gap: 15px; /* İki oyuncu alanı arasındaki boşluk çok az */
        margin-bottom: 15px;
    }
    .player-side {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 15px; 
        padding: 15px; /* Kişi alanını belirginleştiren iç boşluk */
    }
    .side-title {
        text-align: center;
        font-size: 2.2rem; 
        color: #4a3f8a;
        margin-bottom: 5px;
    }
    .opt-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px; 
        flex-grow: 1;
        position: relative;
    }
    /* Şıkların Temel Tasarımı */
    .opt-btn {
        color: #333;
        border: 2px solid transparent;
        border-radius: 20px;
        cursor: pointer;
        transition: transform 0.2s, background 0.3s;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.75);
    }
   .opt-btn:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.95); }
    .opt-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
    .opt-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
    .opt-btn.selected { transform: scale(0.95); opacity: 0.7; pointer-events: none; }
    .opt-btn:disabled { pointer-events: none; }

   /* TEK KİŞİLİK MOD (Devasa Şıklar) */
    .mode-1p .opt-btn {
        font-size: 4.5rem; 
        min-height: 120px;
    }

    /* İKİ KİŞİLİK MOD (Büyük ama Ekrana Sığan Şıklar) */
    .mode-2p .opt-btn {
        font-size: 3.5rem;
        min-height: 110px;
    }

    /* Navigasyon Alanı (Daha Kompakt) */
    .nav-area {
        display: flex;
        justify-content: center;
        gap: 15px; 
        padding-bottom: 1vh; 
        margin-top: 1vh; 
        direction: ltr; 
    }

    /* İleri / Geri Tuşlarının Kendisi */
    .nav-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px; 
        color: #4a3f8a;
        padding: 10px 30px; 
        font-size: clamp(1.8rem, 3vh, 2.2rem); 
        min-height: auto; 
        line-height: 1; /* Simetri için */
    }

    /* Arapça fontun optik dengesizliğini çözmek için */
    .nav-btn span {
        display: block;
        margin-bottom: 4px; 
    }

    /* Ok İkonları */
    .nav-btn svg { 
        fill: #4a3f8a; 
        width: 32px; 
        height: 32px; 
        flex-shrink: 0; 
        display: block;
    }

    /* Buton Pasifken (Disabled) Okların Gri Olması İçin */
    .nav-btn:disabled svg {
        fill: #aaa !important;
    }

    /* Yüzen Puan */
    .floating-point {
        position: absolute;
        font-size: 4rem;
        pointer-events: none;
        animation: floatUp 1.5s ease-out forwards;
        z-index: 1000;
    }
    @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    /* Şimşek Patlama Efekti */
    .lightning-flash {
        position: absolute;
        font-size: 9rem;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 2000;
        animation: explode 0.8s ease-out forwards;
        filter: drop-shadow(0 0 25px rgba(255, 210, 0, 0.9));
    }
    @keyframes explode {
        0% { transform: translate(-50%, -50%) scale(0.5) rotate(-20deg); opacity: 1; }
        20% { transform: translate(-50%, -50%) scale(1.5) rotate(15deg); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(2.5) rotate(0deg); opacity: 0; }
    }

    /* Sonuç Ekranı */
    #result-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }
    .winner-text { font-size: 5rem; margin-bottom: 20px; color: #4a3f8a; }
    .final-score { font-size: 4rem; margin-bottom: 40px; color: #333; }

    .hidden { display: none !important; }

    /* === ZAMİR RENKLENDİRMELERİ (CİNSİYETE GÖRE) === */
    
    /* Erkek Zamirler (Müzekker - Mavi) */
    #pro-هو, #pro-أنت {
        background: rgba(79, 172, 254, 0.2); /* Pasifken uçuk mavi */
        color: #2b7bc0;
        border-color: rgba(79, 172, 254, 0.4);
    }
    #pro-هو.active, #pro-أنت.active {
        background: #4facfe; /* Aktifken tam mavi */
        color: #fff;
        border-color: #fff;
    }
    #pro-هو.active::after, #pro-أنت.active::after {
        border-color: #4facfe; /* Dalga efekti rengi */
    }

    /* Kız Zamirler (Müennes - Pembe) */
    #pro-هي, #pro-أنت_f {
        background: rgba(255, 117, 140, 0.2); /* Pasifken uçuk pembe */
        color: #d6336c;
        border-color: rgba(255, 117, 140, 0.4);
    }
    #pro-هي.active, #pro-أنت_f.active {
        background: #ff758c; /* Aktifken tam pembe */
        color: #fff;
        border-color: #fff;
    }
    #pro-هي.active::after, #pro-أنت_f.active::after {
        border-color: #ff758c; /* Dalga efekti rengi */
    }

    /* "Ene" Zamiri (Ortak - Mevcut Mor) */
    #pro-أنا {
        background: rgba(118, 75, 162, 0.15); /* Pasifken uçuk mor */
        color: #764ba2;
        border-color: rgba(118, 75, 162, 0.3);
    }
    #pro-أنا.active {
        background: #764ba2; /* Aktifken tam mor */
        color: #fff;
        border-color: #fff;
    }
    #pro-أنا.active::after {
        border-color: #764ba2; /* Dalga efekti rengi */
    }

    /* Başlangıç Butonları (Emoji üstte, yazı altta) */
    .start-buttons .btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 25px; 
        padding: 40px 40px; 
        min-width: 300px; /* Kutuların genişliğini birbirine eşitler */
        border-radius: 40px; 
    }
    
    .start-buttons .btn .emoji {
        font-size: 4rem; /* Emojileri kocaman ve belirgin yaptık */
        line-height: 1;
    }

    /* === İLERİ TUŞU VURGUSU (ŞIK SEÇİLDİKTEN SONRA) === */
    .nav-btn.highlight-next {
        background: #28a745 !important; /* Doğru cevap yeşili */
        color: #fff !important;
        border: 2px solid #fff;
        animation: pulseNext 1s infinite alternate ease-in-out;
        z-index: 10;
    }
    
    .nav-btn.highlight-next svg {
        fill: #fff !important;
    }

    @keyframes pulseNext {
        0% { 
            transform: scale(1); 
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.5); 
        }
        100% { 
            transform: scale(1.1); 
            box-shadow: 0 0 25px rgba(40, 167, 69, 0.9); 
        }
    }

    /* =========================================
       📱 MOBİL İÇİN KAPSAMLI OPTİMİZASYON 
       ========================================= */
    @media (max-width: 768px) {
        
        /* 1. İki Kişilik Modu Gizle */
        #btn-2p {
            display: none !important;
        }

        /* 2. Başlangıç Ekranı Ayarları */
        #start-screen h1 {
            font-size: 3.5rem; /* Başlık mobilde küçültüldü */
            margin-bottom: 30px;
        }
        .start-buttons .btn {
            min-width: 240px;
            padding: 20px 30px;
            gap: 15px;
            border-radius: 30px;
        }
        .start-buttons .btn .emoji {
            font-size: 3.5rem;
        }

        /* 3. Üst Bar ve İkonlar */
        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
        }
        .icon-btn svg {
            width: 24px;
            height: 24px;
        }
        .instruction {
            font-size: 1.6rem; /* Yönerge yazısı küçültüldü */
            padding-top: 10px;
        }

        /* 4. Zamir Çubuğu */
        .pronouns-bar {
            gap: 8px;
            flex-wrap: wrap; /* Ekrana sığmazsa alt satıra geçer */
        }
        .pro-badge {
            font-size: 1.4rem;
            padding: 8px 15px;
            border-radius: 15px;
        }

        /* 5. Cümle Alanı */
        .sentence-area {
            font-size: 3rem; /* Cümle mobilde taşmasın diye küçültüldü */
            padding: 15px 20px;
        }
        .blank {
            min-width: 100px;
            padding: 0 5px;
        }

        /* 6. Şıklar Alanı */
        .options-area {
            margin-bottom: 10px;
        }
        .player-side {
            padding: 10px;
            gap: 10px;
        }
        .side-title {
            font-size: 1.6rem;
        }
        .opt-grid {
            gap: 10px;
        }
        .mode-1p .opt-btn {
            font-size: 2.4rem; /* Mobilde şık yazıları */
            min-height: 80px;  /* Buton yükseklikleri kısıldı */
            border-radius: 15px;
        }

        /* 7. İleri ve Geri Tuşları */
        .nav-area {
            gap: 15px;
        }
        .nav-btn {
            font-size: 1.4rem;
            padding: 10px 20px;
        }
        .nav-btn svg {
            width: 24px;
            height: 24px;
        }

        /* 8. Şimşek ve Puan Animasyonları */
        .floating-point {
            font-size: 2.5rem;
        }
        .lightning-flash {
            font-size: 6rem;
        }

        /* 9. Sonuç Ekranı */
        .winner-text {
            font-size: 3.5rem;
        }
        .final-score {
            font-size: 3rem;
        }
    }
</style>
</head>
<body>

<script>
let _actx;
function _ac() { if(!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)(); return _actx; }
function _tone(freq, dur, type='sine', vol=0.3, delay=0) {
    try {
        const c=_ac(), o=c.createOscillator(), g=c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value=freq; o.type=type;
        const t=c.currentTime+delay;
        g.gain.setValueAtTime(vol,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.start(t); o.stop(t+dur);
    } catch(e){}
}
function sesDogru() { _tone(523,0.1,'sine',0.3,0); _tone(659,0.1,'sine',0.3,0.1); _tone(784,0.25,'sine',0.3,0.2); }
function sesYanlis() { _tone(180,0.15,'sawtooth',0.25,0); _tone(150,0.2,'sawtooth',0.2,0.15); }
function sesTikla() { _tone(900,0.04,'sine',0.12); }
</script>

<script>
const dbAll = [
    {p:"هُوَ",s:"_____ في الصَّباحِ مُبَكِّرًا.",c:"يَسْتَيْقِظُ",w:["تَسْتَيْقِظُ","تَسْتَيْقِظِينَ","أَسْتَيْقِظُ"], pId:"هو"},
    {p:"هِيَ",s:"_____ الفَجْرَ.",c:"تُصَلِّي",w:["يُصَلِّي","تُصَلِّينَ","أُصَلِّي"], pId:"هي"},
    {p:"هُوَ",s:"_____ الفَطورَ مَعَ عائِلَتِهِ.",c:"يَتَناوَلُ",w:["تَتَناوَلُ","تَتَناوَلِينَ","أَتَناوَلُ"], pId:"هو"},
    {p:"هِيَ",s:"_____ مَلابِسَها.",c:"تَلْبَسُ",w:["يَلْبَسُ","تَلْبَسِينَ","أَلْبَسُ"], pId:"هي"},
    {p:"أَنْتَ",s:"_____ إِلى المَدْرَسَة.",c:"تَذْهَبُ",w:["يَذْهَبُ","تَذْهَبِينَ","أَذْهَبُ"], pId:"أنت"},
    {p:"أَنْتِ",s:"_____ إِلى البَيْتِ ظُهْرًا.",c:"تَرْجِعِينَ",w:["تَرْجِعُ","يَرْجِعُ","أَرْجِعُ"], pId:"أنت_f"},
    {p:"أَنْتَ",s:"_____ أُمَّكَ في البَيْت.",c:"تُساعِدُ",w:["تُساعِدِينَ","يُساعِدُ","أُساعِدُ"], pId:"أنت"},
    {p:"أَنْتِ",s:"_____ الدُروسَ مَساءً.",c:"تَدْرُسِينَ",w:["تَدْرُسُ","يَدْرُسُ","أَدْرُسُ"], pId:"أنت_f"},
    {p:"أَنَا",s:"_____ في الصَّباحِ مُبَكِّرًا.",c:"أَسْتَيْقِظُ",w:["يَسْتَيْقِظُ","تَسْتَيْقِظُ","تَسْتَيْقِظِينَ"], pId:"أنا"},
    {p:"أَنَا",s:"_____ دُروسي مَساءً.",c:"أَدْرُسُ",w:["تَدْرُسُ","يَدْرُسُ","تَدْرُسِينَ"], pId:"أنا"},
    {p:"أَنَا",s:"_____ إِلى المَدْرَسَة.",c:"أَذْهَبُ",w:["يَذْهَبُ","تَذْهَبُ","تَذْهَبِينَ"], pId:"أنا"},
    {p:"أَنَا",s:"_____ أُمِّي في البَيْت.",c:"أُساعِدُ",w:["يُساعِدُ","تُساعِدُ","تُساعِدِينَ"], pId:"أنا"}
];

let mode = 1;
let questions = [];
let currentQ = 0;
let scoreP1 = 0;
let scoreP2 = 0;
let answersState = []; 
let qStartTime = 0;
let p1Answer = null;
let p2Answer = null;

const soundYonerge = new Audio('yonergezamir.mp3');

function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function goMainHome() { location.href = 'index.html'; }

function goHome() {
    sesTikla();
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
    document.getElementById('ingame-back-btn').classList.add('hidden');
    document.getElementById('main-home-btn').classList.remove('hidden'); // Ana sayfa butonunu geri getir
}

function startGame(m) {
    sesTikla();
    soundYonerge.currentTime = 0;
    soundYonerge.play().catch(e=>console.log(e));

    mode = m;
    scoreP1 = 0;
    scoreP2 = 0;
    currentQ = 0;
    
    questions = shuffle([...dbAll]).slice(0, 5);
    answersState = Array(5).fill(null);

    document.getElementById('start-screen').style.display = 'none';
    
    let gameScreen = document.getElementById('game-screen');
    gameScreen.style.display = 'flex';
    
    // YENİ EKLENEN SATIR: CSS modunu ayarlıyoruz
    gameScreen.className = m === 1 ? 'mode-1p' : 'mode-2p';

    document.getElementById('ingame-back-btn').classList.remove('hidden');
    document.getElementById('main-home-btn').classList.add('hidden'); 

    if(mode === 2) {
        document.getElementById('side-p2').classList.remove('hidden');
    } else {
        document.getElementById('side-p2').classList.add('hidden');
    }

    updateScores();
    loadQuestion();
}

function updateScores() {
    if(mode === 1) {
        document.getElementById('title-p1').innerHTML = `النقاط: <span style="color:#28a745; font-weight:bold;">${scoreP1}</span>`;
    } else {
        document.getElementById('title-p1').innerHTML = `اللاعب الأول: <span style="color:#28a745; font-weight:bold;">${scoreP1}</span>`;
        document.getElementById('title-p2').innerHTML = `اللاعب الثاني: <span style="color:#dc3545; font-weight:bold;">${scoreP2}</span>`;
    }
}

function loadQuestion() {
    p1Answer = null;
    p2Answer = null;
    let q = questions[currentQ];
    
    document.querySelectorAll('.pro-badge').forEach(b => b.classList.remove('active'));
    document.getElementById('pro-' + q.pId).classList.add('active');

    let blankHtml = `<span class="blank" id="q-blank">؟</span>`;
    document.getElementById('sentence').innerHTML = q.s.replace('_____', blankHtml);

    let baseOpts = [{t: q.c, ok: true}, ...q.w.slice(0,3).map(x => ({t: x, ok: false}))];
    let state = answersState[currentQ];

    renderOptions('opts-p1', 1, shuffle([...baseOpts]), q.c, state);
    if(mode === 2) renderOptions('opts-p2', 2, shuffle([...baseOpts]), q.c, state);

    document.getElementById('btn-prev').disabled = (currentQ === 0);
    document.getElementById('btn-next').disabled = !state; 
    
    // <-- ŞU BLOK YENİ EKLENDİ -->
    if(state) {
        document.getElementById('btn-next').classList.add('highlight-next');
    } else {
        document.getElementById('btn-next').classList.remove('highlight-next');
    }
    // <-------------------------->

    qStartTime = Date.now();
}

function renderOptions(containerId, playerNum, optsArr, correctText, state) {
    let container = document.getElementById(containerId);
    container.innerHTML = '';

    optsArr.forEach(o => {
        let btn = document.createElement('button');
        btn.className = 'opt-btn glass';
        btn.textContent = o.t;
        
        if(state) {
            btn.disabled = true;
            if(o.ok) btn.classList.add('correct');
            else if((playerNum===1 && state.p1Ans === o.t) || (playerNum===2 && state.p2Ans === o.t)) {
                btn.classList.add('wrong');
            }
        } else {
            btn.onclick = () => handleAnswer(playerNum, o, btn, correctText);
        }
        container.appendChild(btn);
    });
}

function handleAnswer(playerNum, opt, btnObj, correctText) {
    sesTikla();
    let timeTaken = Date.now() - qStartTime;
    
    if(playerNum === 1) {
        p1Answer = { opt: opt, btn: btnObj, time: timeTaken };
        disableSide('opts-p1');
        btnObj.classList.add('selected');
    } else {
        p2Answer = { opt: opt, btn: btnObj, time: timeTaken };
        disableSide('opts-p2');
        btnObj.classList.add('selected');
    }

    if(mode === 1 && p1Answer) evaluate(correctText);
    else if(mode === 2 && p1Answer && p2Answer) evaluate(correctText);
}

function disableSide(containerId) {
    document.getElementById(containerId).querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
}

function evaluate(correctText) {
    let blank = document.getElementById('q-blank');
    blank.textContent = correctText;
    blank.style.color = '#28a745';
    blank.style.borderColor = '#28a745';

    let pts1 = 0, pts2 = 0;

    const reveal = (ans, containerId) => {
        if(!ans) return;
        document.getElementById(containerId).querySelectorAll('.opt-btn').forEach(b => {
            b.classList.remove('selected');
            if(b.textContent === correctText) b.classList.add('correct');
            else if(b === ans.btn) b.classList.add('wrong');
        });
    };

    reveal(p1Answer, 'opts-p1');
    reveal(p2Answer, 'opts-p2');

    let anyCorrect = false;

    if(mode === 1) {
        if(p1Answer.opt.ok) { pts1 = 10; anyCorrect = true; }
    } else {
        let p1Ok = p1Answer.opt.ok;
        let p2Ok = p2Answer.opt.ok;
        
        if(p1Ok) { pts1 = 10; anyCorrect = true; }
        if(p2Ok) { pts2 = 10; anyCorrect = true; }

        if(p1Ok && p2Ok) {
            if(p1Answer.time < p2Answer.time) { pts1 += 10; triggerLightning('opts-p1'); }
            else if(p2Answer.time < p1Answer.time) { pts2 += 10; triggerLightning('opts-p2'); }
        } else if (p1Ok && !p2Ok) {
            pts1 += 10; triggerLightning('opts-p1');
        } else if (!p1Ok && p2Ok) {
            pts2 += 10; triggerLightning('opts-p2');
        }
    }

    if(anyCorrect) sesDogru(); else sesYanlis();

    if(pts1 > 0) showAnimPoint(pts1, 'opts-p1', '#28a745');
    if(pts2 > 0) showAnimPoint(pts2, 'opts-p2', '#dc3545');

    scoreP1 += pts1;
    scoreP2 += pts2;
    updateScores();

    answersState[currentQ] = {
        p1Ans: p1Answer ? p1Answer.opt.t : null,
        p2Ans: p2Answer ? p2Answer.opt.t : null
    };
    document.getElementById('btn-next').disabled = false;
    document.getElementById('btn-next').classList.add('highlight-next'); // <-- BU SATIRI EKLE
}

function showAnimPoint(points, containerId, color) {
    let container = document.getElementById(containerId);
    let rect = container.getBoundingClientRect();
    let anim = document.createElement('div');
    anim.className = 'floating-point';
    anim.textContent = '+' + points;
    anim.style.color = color;
    anim.style.left = (rect.left + rect.width / 2 - 20) + 'px';
    anim.style.top = (rect.top + rect.height / 2) + 'px';
    document.body.appendChild(anim);
    setTimeout(() => anim.remove(), 1500);
}

function triggerLightning(containerId) {
    let container = document.getElementById(containerId);
    let rect = container.getBoundingClientRect();
    let flash = document.createElement('div');
    flash.className = 'lightning-flash';
    flash.innerHTML = '⚡';
    flash.style.left = (rect.left + rect.width / 2) + 'px';
    flash.style.top = (rect.top + rect.height / 2) + 'px';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 800);
}

function nextQuestion() {
    sesTikla();
    if(currentQ < 4) { currentQ++; loadQuestion(); }
    else endGame();
}

function prevQuestion() {
    sesTikla();
    if(currentQ > 0) { currentQ--; loadQuestion(); }
}

function endGame() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('ingame-back-btn').classList.add('hidden');

    let winnerBox = document.getElementById('result-winner');
    let finalScoreBox = document.getElementById('result-score');

    if(mode === 1) {
        winnerBox.textContent = "انتهت اللعبة!";
        finalScoreBox.innerHTML = `مجموع النقاط: <span style="color:#28a745">${scoreP1}</span>`;
    } else {
        winnerBox.textContent = "النَّتيجَة النِّهائِيَّة";
        if(scoreP1 > scoreP2) {
            finalScoreBox.innerHTML = `اللاعب الأول فاز!<br><span style="color:#28a745">${scoreP1}</span> - <span style="color:#dc3545">${scoreP2}</span>`;
        } else if (scoreP2 > scoreP1) {
            finalScoreBox.innerHTML = `اللاعب الثاني فاز!<br><span style="color:#28a745">${scoreP1}</span> - <span style="color:#dc3545">${scoreP2}</span>`;
        } else {
            finalScoreBox.innerHTML = `تعادل!<br><span style="color:#28a745">${scoreP1}</span> - <span style="color:#dc3545">${scoreP2}</span>`;
        }
    }
}
</script>
