<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ماذا فَعَلْتُ اليَوْم؟ - أَلْعاب</title>
    <style>
        @font-face { 
            font-family: 'Arakom'; 
            src: url('arakom.ttf') format('truetype'); 
        }
        
        :root {
            --primary: #2c3e50;
            --secondary: #d35400;
            --accent: #2980b9;
            --text-main: #34495e;
        }

        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        /* GÜNLÜK HAYAT KONSEPTİ: Sabah, Öğle ve Akşamüstü Pastel Tonları */
        body {
            font-family: 'Arakom', 'Segoe UI', Tahoma, sans-serif; 
            background-color: #fdfbfb;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 235, 180, 0.8) 0%, transparent 50%), /* Sabah güneşi */
                radial-gradient(circle at 90% 80%, rgba(180, 220, 255, 0.7) 0%, transparent 50%), /* Gündüz mavisi */
                radial-gradient(circle at 80% 20%, rgba(255, 210, 200, 0.7) 0%, transparent 50%), /* Akşamüstü */
                radial-gradient(circle at 20% 90%, rgba(230, 240, 250, 0.8) 0%, transparent 50%); /* Gece/Gri */
            background-attachment: fixed;
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 2vh 2vw; /* Boşluklar mobilde daha dar olması için kısıldı */
            overflow-x: hidden; 
            position: relative;
        }

        /* --- ARKA PLAN SAYDAM EMOJİLER (GÜNLÜK HAYAT) --- */
        .floating-emojis {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: -2;
            overflow: hidden;
        }

        .floating-emojis span {
            position: absolute;
            opacity: 0.25; 
            animation: float ease-in-out infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            100% { transform: translateY(-20px) rotate(10deg) scale(1.05); }
        }

        /* Agresif küçülen saydam emojiler */
        .em-1 { top: 5%; left: 4%; font-size: clamp(2.5rem, 6vw, 5rem); animation-duration: 12s; animation-delay: 0s; } /* Saat/Uyanma */
        .em-2 { top: 8%; right: 5%; font-size: clamp(3rem, 7vw, 6rem); animation-duration: 15s; animation-delay: -2s; } /* Güneş */
        .em-3 { top: 35%; left: 3%; font-size: clamp(2rem, 5vw, 4.5rem); animation-duration: 14s; animation-delay: -5s; } /* Okul/Otobüs */
        .em-4 { top: 40%; right: 3%; font-size: clamp(3.5rem, 8vw, 6.5rem); animation-duration: 18s; animation-delay: -3s; } /* Kahvaltı/Yemek */
        .em-5 { top: 75%; left: 5%; font-size: clamp(3rem, 7vw, 5.5rem); animation-duration: 13s; animation-delay: -7s; } /* Kitap/Ders */
        .em-6 { top: 72%; right: 6%; font-size: clamp(2.5rem, 6vw, 4.5rem); animation-duration: 16s; animation-delay: -1s; } /* Spor/Top */
        .em-7 { top: 18%; left: 15%; font-size: clamp(1.8rem, 4vw, 3.5rem); animation-duration: 11s; animation-delay: -4s; } /* Diş fırçalama/Temizlik */
        .em-8 { top: 22%; right: 12%; font-size: clamp(2rem, 5vw, 4rem); animation-duration: 17s; animation-delay: -6s; } /* Çay/Kahve */
        .em-9 { top: 88%; left: 18%; font-size: clamp(1.8rem, 4vw, 3.5rem); animation-duration: 14s; animation-delay: -2s; } /* TV/Oyun */
        .em-10 { top: 85%; right: 20%; font-size: clamp(2.5rem, 6vw, 5rem); animation-duration: 19s; animation-delay: -8s; } /* Yatak/Uyku */
        .em-11 { top: 4%; left: 28%; font-size: clamp(3rem, 7vw, 5.5rem); animation-duration: 15s; animation-delay: -3s; } /* Ay/Gece */
        .em-12 { top: 5%; right: 30%; font-size: clamp(2rem, 5vw, 4.5rem); animation-duration: 12s; animation-delay: -9s; } /* Duş/Su */

        .main-container {
            width: 100%;
            max-width: 1050px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(15px, 4vh, 45px); /* Mobilde boşluklar daha agresif kısıldı */
            z-index: 10;
        }

        .header { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: clamp(15px, 4vw, 35px) clamp(15px, 6vw, 60px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 700px;
            position: relative;
        }

        /* --- BÜYÜTÜLMÜŞ ÜNİTE ROZETİ --- */
        .unit-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--secondary), #e67e22);
            color: white;
            padding: clamp(8px, 2vw, 12px) clamp(20px, 5vw, 40px); /* Daha dolgun */
            border-radius: 30px;
            font-size: clamp(1.4rem, 4vw, 2.2rem); /* Çok daha büyük font */
            font-weight: normal;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(211, 84, 0, 0.35);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .header h1 { 
            font-size: clamp(1.8rem, 7vw, 4.5rem); /* Minimum boyut agresif küçültüldü */
            color: var(--primary); 
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .header p { 
            color: var(--text-main); 
            font-size: clamp(0.9rem, 4vw, 1.6rem); 
            opacity: 0.8;
        }

        /* Kartlar İçin Agresif Esnek Izgara */
        .grid-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: stretch;
            width: 100%;
            gap: clamp(10px, 3vw, 25px); /* Mobilde kartlar arası boşluk kısıldı */
        }

        .game-card {
            position: relative;
            overflow: hidden; 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 1);
            border-radius: clamp(20px, 4vw, 30px); 
            padding: clamp(10px, 4vw, 25px); /* Mobilde iç boşluklar agresif kısıldı */
            text-align: center;
            text-decoration: none; 
            color: var(--primary); 
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            flex: 1 1 calc(33.333% - 25px);
            max-width: 320px;
            min-width: clamp(120px, 35%, 240px); /* Mobilde çok daha fazla daralabilir */
            min-height: clamp(120px, 18vh, 190px);
            z-index: 1;
        }

        .game-card::before {
            content: attr(data-num);
            position: absolute;
            bottom: -5%;
            left: 2%; 
            font-size: clamp(4rem, 12vw, 10rem); /* Dev rakamlar mobilde hızla küçülür */
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-weight: 400;
            background: linear-gradient(135deg, rgba(44, 62, 80, 0.08), rgba(44, 62, 80, 0.01));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1; 
            line-height: 0.8;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .game-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 15px 40px rgba(41, 128, 185, 0.15);
            border-color: rgba(41, 128, 185, 0.4);
        }

        .game-card:hover::before {
            transform: translateY(-15px) scale(1.05) rotate(-5deg);
            background: linear-gradient(135deg, rgba(41, 128, 185, 0.2), rgba(41, 128, 185, 0.05));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-circle {
            width: clamp(45px, 10vw, 85px); /* Mobilde ikon kutusu iyice küçülür */
            height: clamp(45px, 10vw, 85px); 
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5));
            border: 2px solid rgba(255,255,255,1);
            border-radius: clamp(15px, 4vw, 24px); 
            display: flex; 
            align-items: center;
            justify-content: center; 
            margin-bottom: clamp(8px, 2vw, 15px); 
            font-size: clamp(1.6rem, 5vw, 3.2rem); /* İkon boyutu agresif küçülür */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-card:hover .icon-circle {
            transform: scale(1.15) rotate(8deg);
            background: rgba(255, 255, 255, 1);
            border-color: var(--accent);
        }

        .game-card h2 { 
            font-size: clamp(0.95rem, 8vw, 2.5rem); /* Mobilde başlık daha hızlı küçülür */
            font-weight: normal;
            line-height: 1.3;
        }

        /* MOBİL EKRANLAR */
        @media (max-width: 768px) {
            .game-card { 
                flex-basis: calc(50% - 10px);
            }
            .game-card::before {
                bottom: -8%;
            }
        }

        /* ÇOK DAR EKRANLAR (400px altı) */
        @media (max-width: 400px) {
            .game-card {
                flex-basis: 100%;
                max-width: 100%;
                min-height: 80px;
                flex-direction: row; 
                gap: 12px;
                padding: 12px 15px;
                justify-content: flex-start;
                text-align: right;
            }
            .icon-circle {
                margin-bottom: 0;
                flex-shrink: 0;
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
                border-radius: 14px;
            }
            .game-card h2 {
                margin-top: 0;
                font-size: 1rem;
            }
            .game-card::before {
                left: 5%;
                bottom: -25%;
                font-size: 4.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="floating-emojis">
        <span class="em-1">⏰</span>

            <a href="zamirtesti.html" class="game-card" data-num="4">

            </a>

            <a href="saat.html" class="game-card" data-num="5">
                <div class="icon-circle">⏰</div>

        </div>
    </div>

</body>
</html>
