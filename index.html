<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ماذا فَعَلْتُ اليَوْم؟ - أَلْعاب</title>
    <style>
        @font-face { 
            font-family: 'Arakom'; 
            src: url('arakom.ttf') format('truetype'); 
        }
        
        :root {
            --primary: #2c3e50;
            --secondary: #d35400; /* Günlük hayatın enerjisini yansıtan sıcak turuncu/kiremit */
            --accent: #2980b9;
            --text-main: #34495e;
        }

        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        /* GÜNLÜK HAYAT KONSEPTİ: Sabah, Öğle ve Akşamüstü Pastel Tonları */
        body {
            font-family: 'Arakom', 'Segoe UI', Tahoma, sans-serif; 
            background-color: #fdfbfb;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 235, 180, 0.8) 0%, transparent 50%), /* Sabah güneşi sarısı */
                radial-gradient(circle at 90% 80%, rgba(180, 220, 255, 0.7) 0%, transparent 50%), /* Gündüz mavisi */
                radial-gradient(circle at 80% 20%, rgba(255, 210, 200, 0.7) 0%, transparent 50%), /* Akşamüstü şeftali/pembe */
                radial-gradient(circle at 20% 90%, rgba(230, 240, 250, 0.8) 0%, transparent 50%); /* Ferah beyaz/gri */
            background-attachment: fixed;
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 3vh 3vw;
            overflow-x: hidden; 
        }

        .main-container {
            width: 100%;
            max-width: 1050px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(25px, 5vh, 45px); 
        }

        /* Başlık Alanı - Yeni Konsepte Uygun */
        .header { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: clamp(20px, 4vw, 35px) clamp(25px, 6vw, 60px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 700px;
            position: relative;
        }

        .unit-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--secondary), #e67e22);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(211, 84, 0, 0.3);
        }

        .header h1 { 
            font-size: clamp(2.2rem, 6vw, 4rem); 
            color: var(--primary); 
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .header p { 
            color: var(--text-main); 
            font-size: clamp(1.1rem, 3vw, 1.6rem); 
            opacity: 0.8;
        }

        /* Kartlar İçin Güvenli Esnek Izgara */
        .grid-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: stretch;
            width: 100%;
            gap: clamp(15px, 2vw, 25px);
        }

        /* Oyun Kartı */
        .game-card {
            position: relative;
            overflow: hidden; 
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 1);
            border-radius: 30px; 
            padding: clamp(15px, 3vw, 25px); 
            text-align: center;
            text-decoration: none; 
            color: var(--primary); 
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            flex: 1 1 calc(33.333% - 25px);
            max-width: 320px;
            min-width: clamp(150px, 40%, 240px);
            min-height: clamp(150px, 20vh, 190px);
            z-index: 1;
        }

        /* --- ÇOK DAHA ŞIK, ZARİF BÜYÜK RAKAMLAR --- */
        .game-card::before {
            content: attr(data-num);
            position: absolute;
            bottom: -5%;
            left: 2%; 
            font-size: clamp(6rem, 14vw, 10rem); /* Daha büyük ve gösterişli */
            font-family: 'Georgia', 'Times New Roman', serif; /* Zarif bir serif font */
            font-style: italic;
            font-weight: 900;
            background: linear-gradient(135deg, rgba(44, 62, 80, 0.12), rgba(44, 62, 80, 0.02));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1; 
            line-height: 0.8;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .game-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 15px 40px rgba(41, 128, 185, 0.15);
            border-color: rgba(41, 128, 185, 0.4);
        }

        .game-card:hover::before {
            transform: translateY(-15px) scale(1.05) rotate(-5deg);
            background: linear-gradient(135deg, rgba(41, 128, 185, 0.2), rgba(41, 128, 185, 0.05));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-circle {
            width: clamp(60px, 12vw, 85px); 
            height: clamp(60px, 12vw, 85px); 
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.4));
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 24px; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            margin-bottom: 15px; 
            font-size: clamp(2.2rem, 6vw, 3.2rem);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-card:hover .icon-circle {
            transform: scale(1.15) rotate(8deg);
            background: rgba(255, 255, 255, 1);
            border-color: var(--accent);
        }

        .game-card h2 { 
            font-size: clamp(1.15rem, 3.5vw, 1.5rem);
            font-weight: bold;
            line-height: 1.3;
        }

        /* MOBİL EKRANLAR */
        @media (max-width: 768px) {
            .game-card { 
                flex-basis: calc(50% - 15px);
                border-radius: 25px;
            }
            .game-card::before {
                font-size: clamp(5rem, 16vw, 8rem); 
                bottom: -8%;
            }
        }

        /* ÇOK DAR EKRANLAR (400px altı) */
        @media (max-width: 400px) {
            .game-card {
                flex-basis: 100%;
                max-width: 100%;
                min-height: 100px;
                flex-direction: row; 
                gap: 15px;
                padding: 15px 20px;
                justify-content: flex-start;
                text-align: right;
            }
            .icon-circle {
                margin-bottom: 0;
                flex-shrink: 0;
                width: 55px;
                height: 55px;
                font-size: 1.8rem;
                border-radius: 18px;
            }
            .game-card h2 {
                margin-top: 0;
                font-size: 1.2rem;
            }
            .game-card::before {
                left: 5%;
                bottom: -20%;
                font-size: 6rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <span class="unit-badge">الوَحْدَة الأولى</span>
            <h1>ماذا فَعَلْتُ اليَوْم؟</h1>
            <p>أَلْعاب اللُّغَة العَرَبِيَّة لِلْحَياةِ اليَوْمِيَّة</p>
        </div>

        <div class="grid-container">
            <a href="kelime.html" class="game-card" data-num="1">
                <div class="icon-circle">🎯</div>
                <h2>صَيْد الرُّموز</h2>
            </a>

            <a href="sestesti.html" class="game-card" data-num="2">
                <div class="icon-circle">🎧</div>
                <h2>اخْتِبار الاِسْتِماع</h2>
            </a>

            <a href="hafizakarti.html" class="game-card" data-num="3">
                <div class="icon-circle">🧠</div>
                <h2>لُعْبَة الذّاكِرَة</h2>
            </a>

            <a href="zamirtesti.html" class="game-card" data-num="4">
                <div class="icon-circle">📝</div>
                <h2>اِخْتَر الفِعْل الصَّحيح</h2>
            </a>

            <a href="saat.html" class="game-card" data-num="5">
                <div class="icon-circle">⏰</div>
                <h2>قِراءَة السّاعَة</h2>
            </a>
        </div>
    </div>

</body>
</html>
