<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة نعم أو لا</title>
    <style>
        /* Arakom Fontu Tanımlaması */
        @font-face {
            font-family: 'Arakom';
            src: url('arakom.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arakom', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        /* Ortak Dinamik SVG Butonu (Anasayfa / Geri) - SOL TARAFA ALINDI */
        .nav-svg {
            position: absolute;
            top: 20px;
            left: 30px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.2s;
        }

        .nav-svg:hover {
            transform: scale(1.1);
        }

        /* Başlangıç Ekranı */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background-color: #e3f2fd;
        }

        h1 {
            font-size: 5rem;
            color: #1565c0;
            margin-bottom: 40px;
            text-align: center;
        }

        .main-btn {
            font-family: 'Arakom', sans-serif;
            font-size: 3.5rem;
            padding: 20px 80px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
        }

        .main-btn:hover {
            background-color: #45a049;
        }

        /* Oyun Ekranı Ana Kapsayıcı */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column; /* Üst yönerge ve alt oyuncular için dikey dizilim */
        }

        /* Oyun Ekranı Üst Yönerge ve Sinüs Dalgası Çubuğu */
        #game-header {
            width: 100%;
            height: 100px;
            background-color: #ffffff;
            border-bottom: 3px solid #bdc3c7;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .instruction-text {
            font-size: 3.5rem;
            color: #2980b9;
            font-weight: normal;
        }

        /* Sinüs Dalgası Animasyon CSS */
        .sine-wave-container {
            width: 120px;
            height: 40px;
            overflow: hidden;
            opacity: 0.2; /* Ses çalmazken soluk */
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
        }

        .sine-wave-container.active {
            opacity: 1; /* Ses çalarken net ve parlak */
        }

        .sine-wave-container svg {
            width: 200%;
            height: 100%;
        }

        /* RTL (Arapça) sayfa yönünde translation için 50% sağa/sola hareket */
        .sine-wave-container.active svg {
            animation: moveWave 1.5s linear infinite;
        }

        @keyframes moveWave {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); } /* RTL uyumlu kaydırma */
        }

        /* Oyuncuların Olduğu Alt Alan */
        #players-container {
            display: flex;
            flex: 1;
            width: 100%;
        }

        .player-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        #p1-side {
            border-left: 4px dashed #bdc3c7;
            background-color: #ffffff;
        }

        #p2-side {
            background-color: #fdfefe;
        }
        
        #p1-content, #p2-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Emoji Gösterimi - Tamamen Ortalı ve Sabit Yükseklik */
        .emoji-display {
            font-size: 10rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 120px;
        }

        /* Soru Cümlesi - SABİT YÜKSEKLİK (Butonların kaymasını engeller) */
        .question-text {
            font-size: 5rem;
            text-align: center;
            font-weight: normal;
            color: #2c3e50;
            margin-bottom: 50px;
            height: 250px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.3;
        }

        .btn-container {
            display: flex;
            gap: 30px;
            height: 90px;
            align-items: center;
        }

        .btn {
            font-family: 'Arakom', sans-serif;
            font-size: 3rem;
            padding: 20px 50px;
            cursor: pointer;
            border: none;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: white;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        
        .btn:active {
            transform: translateY(5px);
        }

        .btn-yes { background-color: #2ecc71; }
        .btn-no { background-color: #e74c3c; }

        /* İlerleme Çubuğu */
        .progress-bar {
            display: flex;
            gap: 15px;
            position: absolute;
            bottom: 40px;
        }

        .progress-step {
            width: 60px;
            height: 20px;
            background-color: #ecf0f1;
            border-radius: 10px;
            border: 2px solid #bdc3c7;
        }

        .progress-step.correct { background-color: #2ecc71; border-color: #27ae60; }
        .progress-step.wrong { background-color: #e74c3c; border-color: #c0392b; }

        /* Bitiş Ekranı */
        #end-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            z-index: 10;
        }

        .bitti-mesaj {
            font-size: 5rem;
            color: #2980b9;
            text-align: center;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <audio id="yonergeAudio" src="yonergeevethayir.mp3" preload="auto"></audio>

    <svg id="nav-btn" class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="#1565c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" onclick="handleNav()">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>

    <div id="start-screen">
        <h1>مُسابَقَة نَعَم أَو لا</h1>
        <button class="main-btn" onclick="startGame()">اِبْدَأْ</button>
    </div>

    <div id="game-screen">
        
        <div id="game-header">
            <div class="instruction-text">اِنْتَبِهْ إِلى الدَّليل وَالجُمْلَة ثُمَّ أَجِبْ‫.‬</div> <div class="sine-wave-container" id="sineWave">
                <svg viewBox="0 0 200 20" preserveAspectRatio="none">
                    <path d="M 0 10 Q 12.5 0 25 10 T 50 10 T 75 10 T 100 10 T 125 10 T 150 10 T 175 10 T 200 10" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <div id="players-container">
            <div id="p1-side" class="player-side">
                <div id="p1-content">
                    <div id="p1-emoji" class="emoji-display">❓</div>
                    <div id="p1-text" class="question-text">جاري التحميل...</div>
                    <div id="p1-btn-container" class="btn-container">
                        <button class="btn btn-yes" onclick="checkAnswer('p1', true)">نَعَم 👍</button>
                        <button class="btn btn-no" onclick="checkAnswer('p1', false)">لا 👎</button>
                    </div>
                </div>
                <div class="progress-bar" id="p1-progress">
                    <div class="progress-step" id="p1-step-0"></div>
                    <div class="progress-step" id="p1-step-1"></div>
                    <div class="progress-step" id="p1-step-2"></div>
                </div>
            </div>

            <div id="p2-side" class="player-side">
                <div id="p2-content">
                    <div id="p2-emoji" class="emoji-display">❓</div>
                    <div id="p2-text" class="question-text">جاري التحميل...</div>
                    <div id="p2-btn-container" class="btn-container">
                        <button class="btn btn-yes" onclick="checkAnswer('p2', true)">نَعَم 👍</button>
                        <button class="btn btn-no" onclick="checkAnswer('p2', false)">لا 👎</button>
                    </div>
                </div>
                <div class="progress-bar" id="p2-progress">
                    <div class="progress-step" id="p2-step-0"></div>
                    <div class="progress-step" id="p2-step-1"></div>
                    <div class="progress-step" id="p2-step-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="end-screen">
        <div class="bitti-mesaj">دَوْر الطُّلّاب الجُدُد</div>
        <button class="main-btn" onclick="resetGame()">اِبْدَأْ جَوْلَة جَديدَة</button>
    </div>

    <script>
        const allQuestions = [
    // Mevcut Sorular
    { text: "هَل تَشْرَبُ القَهْوَة؟", trueEmoji: "☕", falseEmoji: "🧃" }, // [cite: 6]
    { text: "هَل تَأْكُلُ الدَّجاج؟", trueEmoji: "🍗", falseEmoji: "🐟" }, // [cite: 8]
    { text: "هَل تَتَناوَلُ الفَطور؟", trueEmoji: "🍳", falseEmoji: "🍔" }, // [cite: 1]
    { text: "هَل تُنَظِّفُ أَسْنانَكَ؟", trueEmoji: "🪥", falseEmoji: "📺" }, // [cite: 3]
    { text: "هَل تَذْهَبُ إِلى المَدْرَسَة؟", trueEmoji: "🏫", falseEmoji: "🏭" }, // [cite: 1]
    { text: "هَل تَنامُ لَيْلًا؟", trueEmoji: "🛌", falseEmoji: "🏃" }, // [cite: 2]

    // Yeni Eklenen Sorular (1. Ünite Cümleleri ve Diyalogları)
    { text: "هَل تَسْتَيْقِظُ مُبَكِّرًا؟", trueEmoji: "🌅", falseEmoji: "🌃" }, // [cite: 1, 2]
    { text: "هَل تُصَلّي الفَجْر؟", trueEmoji: "🕌", falseEmoji: "⚽" }, // [cite: 1, 3]
    { text: "هَل تَلْبَسُ مَلابِسَكَ؟", trueEmoji: "👕", falseEmoji: "🍽️" }, // [cite: 1]
    { text: "هَل تَرْجِعُ إِلى البَيْت؟", trueEmoji: "🏠", falseEmoji: "🛒" }, // [cite: 2, 4]
    { text: "هَل تُساعِدُ أُمَّكَ؟", trueEmoji: "🧹", falseEmoji: "🎮" }, // [cite: 2, 4]
    { text: "هَل تَدْرُسُ دُروسَكَ مَساءً؟", trueEmoji: "📚", falseEmoji: "📺" }, // [cite: 2, 5]
    { text: "هَل تَأْكُلُ الزَّيْتون؟", trueEmoji: "🫒", falseEmoji: "🍕" }, // [cite: 5]
    { text: "هَل تَشْرَبُ الحَليب؟", trueEmoji: "🥛", falseEmoji: "🧃" }, // [cite: 6]
    { text: "هَل تَأْكُلُ السَّمَك؟", trueEmoji: "🐟", falseEmoji: "🍗" }, // [cite: 6]
    { text: "هَل تَشْرَبُ العَصير؟", trueEmoji: "🧃", falseEmoji: "☕" }, // [cite: 7]
    { text: "هَل تَأْكُلُ العَسَل؟", trueEmoji: "🍯", falseEmoji: "🍉" }, // [cite: 7]
    { text: "هَل تَغْسِلُ يَدَيْكَ؟", trueEmoji: "🧼", falseEmoji: "🚗" }, // [cite: 13, 14]
    { text: "هَل تُحِبُّ الكُفْتَة؟", trueEmoji: "🧆", falseEmoji: "🥗" }, // [cite: 16]
    { text: "هَل تُحِبُّ المَكَرونَة؟", trueEmoji: "🍝", falseEmoji: "🍔" } // [cite: 16]
];

        let p1State = { index: 0, questions: [], currentAnswer: null };
        let p2State = { index: 0, questions: [], currentAnswer: null };
        let currentScreenMode = 'home'; 
        
        // Ses durumu yönetimi
        let audio = document.getElementById('yonergeAudio');
        let sineWave = document.getElementById('sineWave');

        // Ses çalmaya başladığında dalgayı aktif et
        audio.addEventListener('playing', () => {
            sineWave.classList.add('active');
        });

        // Ses duraklatıldığında veya bittiğinde dalgayı pasif et
        audio.addEventListener('pause', () => {
            sineWave.classList.remove('active');
        });
        
        audio.addEventListener('ended', () => {
            sineWave.classList.remove('active');
        });

        function playAudio() {
            if(audio) {
                audio.currentTime = 0; 
                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Tarayıcı sesi engelledi: ", error);
                    });
                }
            }
        }

        function handleNav() {
            if (currentScreenMode === 'home') {
                // Anasayfadayken butona basılırsa index.html dosyasına gider
                window.location.href = 'index.html'; 
            } else {
                goBackToHome(); // Oyun esnasında basılırsa oyunun başlangıç ekranına döner
            }
        }

        function updateNavIcon(mode) {
            const svg = document.getElementById('nav-btn');
            if (mode === 'home') {
                svg.innerHTML = `
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>`;
                currentScreenMode = 'home';
            } else if (mode === 'back') {
                svg.innerHTML = `
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>`;
                currentScreenMode = 'game';
            }
        }

        function goBackToHome() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            
            if(audio) {
                audio.pause();
                audio.currentTime = 0;
            }

            updateNavIcon('home');
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startGame() {
            playAudio(); 

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            updateNavIcon('back'); 

            let shuffledAll = shuffle([...allQuestions]);
            let roundQuestions = shuffledAll.slice(0, 3);
            
            p1State.questions = [
                roundQuestions[0], 
                roundQuestions[1], 
                roundQuestions[2]
            ];
            
            p2State.questions = [
                roundQuestions[2], 
                roundQuestions[0], 
                roundQuestions[1]
            ];
            
            p1State.index = 0;
            p2State.index = 0;

            document.getElementById('p1-text').style.color = '#2c3e50';
            document.getElementById('p2-text').style.color = '#2c3e50';
            document.getElementById('p1-btn-container').style.visibility = 'visible';
            document.getElementById('p2-btn-container').style.visibility = 'visible';

            for(let i=0; i<3; i++){
                document.getElementById(`p1-step-${i}`).className = 'progress-step';
                document.getElementById(`p2-step-${i}`).className = 'progress-step';
            }

            loadQuestion('p1');
            loadQuestion('p2');
        }

        function loadQuestion(playerStr) {
            let state = playerStr === 'p1' ? p1State : p2State;
            
            if (state.index >= 3) {
                document.getElementById(`${playerStr}-emoji`).innerText = "⏳";
                document.getElementById(`${playerStr}-text`).innerText = "في الاِنْتِظار...";
                document.getElementById(`${playerStr}-text`).style.color = "#27ae60";
                document.getElementById(`${playerStr}-btn-container`).style.visibility = "hidden";
                
                checkRoundEnd();
                return;
            }

            let q = state.questions[state.index];
            let isTrueMatch = Math.random() > 0.5;
            state.currentAnswer = isTrueMatch;

            document.getElementById(`${playerStr}-emoji`).innerText = isTrueMatch ? q.trueEmoji : q.falseEmoji;
            document.getElementById(`${playerStr}-text`).innerText = q.text;
        }

        function checkAnswer(playerStr, userSelection) {
            let state = playerStr === 'p1' ? p1State : p2State;
            let stepDiv = document.getElementById(`${playerStr}-step-${state.index}`);
            
            if (userSelection === state.currentAnswer) {
                stepDiv.classList.add('correct');
            } else {
                stepDiv.classList.add('wrong');
            }

            state.index++;
            loadQuestion(playerStr);
        }

        function checkRoundEnd() {
            if (p1State.index >= 3 && p2State.index >= 3) {
                setTimeout(() => {
                    document.getElementById('game-screen').style.display = 'none';
                    document.getElementById('end-screen').style.display = 'flex';
                    updateNavIcon('home');
                }, 800);
            }
        }

        function resetGame() {
            startGame(); 
        }
    </script>
</body>
</html>
